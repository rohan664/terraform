jenkins:
  agentProtocols:
  - JNLP4-connect
  remotingSecurity:
    enabled: true
security:
  globalJobDslSecurityConfiguration:
    useScriptSecurity: false
credentials:
  system:
    domainCredentials:
    - credentials:
      - usernamePassword:
          id: github-ci
          username: $${GITHUB_USERNAME}
          password: $${GITHUB_PASSWORD}
          scope: GLOBAL
      - string:
          id: github-api-token
          secret: $${GITHUB_API_TOKEN}
          scope: GLOBAL
      - string: 
          id: slack-api-token
          secret: $${SLACK_API_TOKEN}
          scope: GLOBAL
unclassified:
  location:
    url: $${JENKINS_URL}
  gitSCM:
    globalConfigName: $${GIT_USER}
    globalConfigEmail: $${GIT_EMAIL}
  gitHubPluginConfig:
    configs:
    - name: github
      credentialsId: github-ci
  slackNotifier:
    teamDomain: cvp-sahaj
    tokenCredentialId: slack-api-token
jobs:
  - script: >
      pipelineJob('seed-job') {
        properties {
          authorizationMatrix {
            entries {
              group {
                name('authenticated')
                permissions([
                  "Overall/Read",
                  "Job/Build",
                  "Job/Cancel",
                  "Job/Read"
                ])
              }
            }
            inheritanceStrategy {
              nonInheriting()
            }
          }
          githubProjectUrl("$${SEED_JOB_REPO_URL}")
          pipelineTriggers {
            triggers {
              githubPush()
            }
          }
        }
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  credentials('	github-ci')
                  url("$${SEED_JOB_REPO_URL}")
                }
                branches("*/$${SEED_JOB_REPO_BRANCH}")
              }
            }
            scriptPath("$${SEED_JOB_JENKINS_FILE}")
          }
        }
      }
