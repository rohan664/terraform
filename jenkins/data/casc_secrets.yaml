jenkins:
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: admin
          password: "${jenkins_admin_password}"
        - id: developer
          password: "${developer_password}"
        - id: devops
          password: "${devops_password}"
  authorizationStrategy:
    projectMatrix:
      entries:
        - user:
            name: "admin"
            permissions:
              - "Overall/Administer"
        - user:
            name: "developer"
            permissions:
              - "Overall/Read"
        - user:
            name: "devops"
            permissions:
              - "Overall/Read"